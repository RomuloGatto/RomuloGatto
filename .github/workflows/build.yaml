name: Generate README

on:
  schedule:
    # Run this workflow everyday at 00:01 UTC
    - cron: '1 0 */1 * *'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 20.9
      - run: npm install --production

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: if no AI key/provider works, the generator falls back to deterministic GitHub activity scoring.
          # GitHub Models can use GITHUB_TOKEN. For Groq/OpenRouter, add the corresponding repository secret.
          ROMULO_OS_AI_PROVIDER: ${{ vars.ROMULO_OS_AI_PROVIDER }}
          ROMULO_OS_AI_MODEL: ${{ vars.ROMULO_OS_AI_MODEL }}
          ROMULO_OS_AI_TEMPERATURE: '0.2'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/index.js

      - name: Commit and push if changed
        run: |-
          git diff
          git config --global user.email "readme-bot@github.com"
          git config --global user.name "README-bot"
          git add -A
          git commit -m "Generated readme" || exit 0
          git push
